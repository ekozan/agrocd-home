apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crowdsec
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    chart: crowdsec
    repoURL: https://crowdsecurity.github.io/helm-charts
    targetRevision: 0.24.0
    helm:
      releaseName: crowdsec
      valuesObject:
      
        container_runtime: containerd

        config:
          parsers:
            s02-enrich:
              matrix-whitelist.yaml: |
                name: my/matrix-whitelist
                description: "Whitelist Matrix/Synapse requests from Traefik logs"
                filter: "evt.Meta.service == 'http' && evt.Meta.log_type == 'http_access-log'"
                whitelist:
                  reason: "Matrix federation/client traffic"
                  expression:
                    - "evt.Meta.http_path startsWith '/_matrix/'"
                    - "evt.Meta.http_path startsWith '/_synapse/'"
                    - "evt.Meta.http_path startsWith '/.well-known/matrix/'"
              office-whitelist.yaml: |
                name: my/office-whitelist
                description: "Évite les faux positifs (crawl/probing) sur le trafic légitime OxiCloud (sync Nextcloud/ownCloud) et Euro-Office (éditeur collaboratif)"
                filter: "evt.Meta.service == 'http' && evt.Meta.log_type == 'http_access-log'"
                whitelist:
                  reason: "OxiCloud sync + Euro-Office document server (trafic applicatif légitime à fort volume)"
                  # Les 401/403 NE sont PAS whitelistés → la détection brute-force
                  # (custom/http-401-bf) et les bans AppSec restent actifs sur l'auth.
                  expression:
                    # OxiCloud — protocole de synchro compatible Nextcloud/ownCloud
                    - "(evt.Meta.http_path startsWith '/remote.php/' || evt.Meta.http_path startsWith '/ocs/' || evt.Meta.http_path == '/status.php') && evt.Meta.http_status != '401' && evt.Meta.http_status != '403'"
                    # Euro-Office — assets et API du document server (fork OnlyOffice)
                    - "(evt.Meta.http_path startsWith '/web-apps/' || evt.Meta.http_path startsWith '/sdkjs/' || evt.Meta.http_path startsWith '/fonts/' || evt.Meta.http_path startsWith '/coauthoring/' || evt.Meta.http_path startsWith '/hosting/' || evt.Meta.http_path startsWith '/cache/' || evt.Meta.http_path == '/healthcheck') && evt.Meta.http_status != '401' && evt.Meta.http_status != '403'"
          scenarios:
            http-401-bf.yaml: |
              type: leaky
              name: custom/http-401-bf
              description: "Répétition de HTTP 401 depuis une IP (bruteforce)"
              filter: "evt.Meta.service == 'http' && evt.Meta.http_status == '401'"
              groupby: "evt.Meta.source_ip"
              capacity: 5
              leakspeed: "1m"
              blackhole: 5m
              labels:
                service: http
                type: bruteforce
                remediation: true
        # Secret LAPI fourni par le Job generate-once (init/01-crowdsec-secret.yaml)
        # plutôt que randomisé par le chart → render déterministe sous ArgoCD
        secrets:
          externalSecret:
            name: crowdsec-lapi-secrets
        # API locale (LAPI) : centralise les décisions, interrogée par le bouncer Traefik
        lapi:
          # Persistance des décisions et des clés bouncers enregistrées
          persistentVolume:
            data:
              enabled: true
              size: 1Gi
        appsec:
          enabled: true
          # ⚠️ Les configs/règles AppSec vont sous `appsec.configs` / `appsec.rules`
          # (PAS sous `config.*`, qui ne les monte pas dans le composant AppSec).
          configs:
            full-appsec.yaml: |
              name: custom/full-appsec
              default_remediation: ban
              inband_rules:
                - crowdsecurity/base-config
                - crowdsecurity/vpatch-*
                - crowdsecurity/generic-*
                # Règles WebDAV custom (définies dans appsec.rules ci-dessous)
                - custom/webdav-xxe
                - custom/webdav-destination-traversal
                - custom/http-bad-method
              outofband_rules:
                - crowdsecurity/experimental-*
          # Règles AppSec custom protégeant la surface WebDAV d'OxiCloud.
          rules:
            webdav-xxe.yaml: |
              name: custom/webdav-xxe
              description: "Bloque les charges XXE (DOCTYPE/ENTITY externes) dans les corps XML WebDAV (PROPFIND/PROPPATCH). Un PROPFIND légitime ne contient jamais de DOCTYPE/ENTITY → pas de faux positif."
              rules:
                - zones:
                    - RAW_BODY
                  transform:
                    - lowercase
                  match:
                    type: regex
                    value: "<!(doctype|entity)"
              labels:
                type: exploit
                service: http
                behavior: "http:exploit"
                label: "WebDAV XXE attempt"
                confidence: 3
            webdav-destination-traversal.yaml: |
              name: custom/webdav-destination-traversal
              description: "Bloque le path traversal dans l'en-tête Destination des requêtes WebDAV MOVE/COPY"
              rules:
                - zones:
                    - HEADERS
                  variables:
                    - Destination
                  transform:
                    - urldecode
                    - lowercase
                  match:
                    type: regex
                    value: "\\.\\.(/|\\\\)"
              labels:
                type: exploit
                service: http
                behavior: "http:exploit"
                label: "WebDAV Destination traversal"
                confidence: 3
            http-bad-method.yaml: |
              name: custom/http-bad-method
              description: "Bloque les méthodes HTTP dangereuses/inutiles (TRACE, TRACK, CONNECT, DEBUG) — durcissement général, complète la protection WebDAV"
              rules:
                - zones:
                    - METHOD
                  transform:
                    - uppercase
                  match:
                    type: regex
                    value: "^(TRACE|TRACK|CONNECT|DEBUG)$"
              labels:
                type: exploit
                service: http
                behavior: "http:exploit"
                label: "Dangerous HTTP method"
                confidence: 3
          acquisitions:
            - source: appsec
              listen_addr: "0.0.0.0:7422"
              path: /
              appsec_config: custom/full-appsec
              labels:
                type: appsec
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules"
        # Agent : DaemonSet qui parse les logs des pods et détecte les comportements
        agent:
          # Collections de parsers/scénarios installées au démarrage
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/traefik crowdsecurity/base-http-scenarios crowdsecurity/http-cve"
          # Sources de logs : access logs des pods Traefik 3
          acquisition:
            - namespace: traefik
              podName: traefik3-*
              program: traefik
          persistentVolume:
            config:
              enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: crowdsec
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      # Secret LAPI désormais déterministe (Job generate-once) → plus de churn
      selfHeal: true
