apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crowdsec
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    chart: crowdsec
    repoURL: https://crowdsecurity.github.io/helm-charts
    targetRevision: 0.24.0
    helm:
      releaseName: crowdsec
      valuesObject:
      
        container_runtime: containerd

        config:
          parsers:
            s02-enrich:
              matrix-whitelist.yaml: |
                name: my/matrix-whitelist
                description: "Whitelist Matrix/Synapse requests from Traefik logs"
                filter: "evt.Meta.service == 'http' && evt.Meta.log_type == 'http_access-log'"
                whitelist:
                  reason: "Matrix federation/client traffic"
                  expression:
                    - "evt.Meta.http_path startsWith '/_matrix/'"
                    - "evt.Meta.http_path startsWith '/_synapse/'"
                    - "evt.Meta.http_path startsWith '/.well-known/matrix/'"
              office-whitelist.yaml: |
                name: my/office-whitelist
                description: "Évite les faux positifs (crawl/probing) sur le trafic légitime OxiCloud (sync Nextcloud/ownCloud) et Euro-Office (éditeur collaboratif)"
                filter: "evt.Meta.service == 'http' && evt.Meta.log_type == 'http_access-log'"
                whitelist:
                  reason: "OxiCloud sync + Euro-Office document server (trafic applicatif légitime à fort volume)"
                  # Les 401/403 NE sont PAS whitelistés → la détection brute-force
                  # (custom/http-401-bf) et les bans AppSec restent actifs sur l'auth.
                  expression:
                    # OxiCloud — protocole de synchro compatible Nextcloud/ownCloud
                    - "(evt.Meta.http_path startsWith '/remote.php/' || evt.Meta.http_path startsWith '/ocs/' || evt.Meta.http_path == '/status.php') && evt.Meta.http_status != '401' && evt.Meta.http_status != '403'"
                    # Euro-Office — assets et API du document server (fork OnlyOffice)
                    - "(evt.Meta.http_path startsWith '/web-apps/' || evt.Meta.http_path startsWith '/sdkjs/' || evt.Meta.http_path startsWith '/fonts/' || evt.Meta.http_path startsWith '/coauthoring/' || evt.Meta.http_path startsWith '/hosting/' || evt.Meta.http_path startsWith '/cache/' || evt.Meta.http_path == '/healthcheck') && evt.Meta.http_status != '401' && evt.Meta.http_status != '403'"
          scenarios:
            http-401-bf.yaml: |
              type: leaky
              name: custom/http-401-bf
              description: "Répétition de HTTP 401 depuis une IP (bruteforce)"
              filter: "evt.Meta.service == 'http' && evt.Meta.http_status == '401'"
              groupby: "evt.Meta.source_ip"
              capacity: 5
              leakspeed: "1m"
              blackhole: 5m
              labels:
                service: http
                type: bruteforce
                remediation: true
          # Profils de remédiation (montés dans le pod LAPI). ⚠️ Fournir ce
          # fichier REMPLACE les profils par défaut → on réinclut le profil
          # générique (ban 4h) en fin de chaîne. Premier filtre qui matche +
          # on_success:break gagne, d'où l'ordre : brute-force auth d'abord.
          profiles.yaml: |
            # Brute-force auth (custom/http-401-bf) : IP clairement hostile qui
            # martèle un endpoint → ban plus long que le défaut.
            name: bruteforce_ban
            filters:
              - Alert.Remediation == true && Alert.GetScenario() == "custom/http-401-bf"
            decisions:
              - type: ban
                duration: 12h
            on_success: break
            ---
            # Défaut CrowdSec : toute autre décision de scope IP (scénarios hub,
            # corrélation AppSec out-of-band, etc.) → ban 4h.
            name: default_ip_remediation
            filters:
              - Alert.Remediation == true && Alert.GetScope() == "Ip"
            decisions:
              - type: ban
                duration: 4h
            on_success: break
        # Secret LAPI fourni par le Job generate-once (init/01-crowdsec-secret.yaml)
        # plutôt que randomisé par le chart → render déterministe sous ArgoCD
        secrets:
          externalSecret:
            name: crowdsec-lapi-secrets
        # API locale (LAPI) : centralise les décisions, interrogée par le bouncer Traefik
        lapi:
          # Persistance des décisions et des clés bouncers enregistrées
          persistentVolume:
            data:
              enabled: true
              size: 1Gi
        appsec:
          enabled: true
          # ⚠️ Les configs/règles AppSec vont sous `appsec.configs` / `appsec.rules`
          # (PAS sous `config.*`, qui ne les monte pas dans le composant AppSec).
          # On s'appuie sur les packs WAF TOUT-FAITS du hub CrowdSec (installés
          # via COLLECTIONS / APPSEC_RULES ci-dessous) plutôt que des règles maison.
          configs:
            full-appsec.yaml: |
              name: custom/full-appsec
              default_remediation: ban
              # Inband (BLOQUE immédiatement) : virtual patching CVE + génériques.
              # Très faible taux de faux positifs → on peut bloquer directement.
              inband_rules:
                - crowdsecurity/base-config
                - crowdsecurity/vpatch-*
                - crowdsecurity/generic-*
              # Out-of-band (ALERTE, ne bloque pas) : OWASP Core Rule Set complet
              # (XXE, traversal, RCE, protocol/method enforcement, etc.). Le
              # scénario crowdsecurity/crowdsec-appsec-outofband (fourni par la
              # collection appsec-crs) corrèle ces alertes et bannit l'IP au-delà
              # d'un seuil → équilibre couverture / faux positifs. Les exclusions
              # Nextcloud/WebDAV (plugin crs-exclusion-plugin-nextcloud) sont
              # incluses automatiquement par le CRS → pas de FP sur /remote.php/.
              outofband_rules:
                - crowdsecurity/crs
                - crowdsecurity/experimental-*
              # Exclusions ciblées : le CRS out-of-band (OWASP CRS) produit des
              # faux positifs sur du trafic applicatif légitime que le pack ne
              # sait pas modéliser. On les retire par CHEMIN via pre_eval, sans
              # toucher aux règles inband (vpatch/generic) ni au CRS ailleurs.
              pre_eval:
                # --- Matrix API client (/_matrix/client/) ---
                # API client-serveur : JSON opaque (contenu des messages, clés E2EE,
                # session IDs base64) que le CRS ne sait pas modéliser → FP à répétition
                # (911100 méthode, 930120 LFI sur "forwarded_count", et potentiellement
                # SQLi/XSS sur du base64 ou du texte utilisateur) pour une valeur
                # défensive quasi nulle (endpoints authentifiés par token, contenu
                # stocké de façon opaque, jamais exécuté). On retire tout le CRS
                # out-of-band sur cette API ; les règles inband (vpatch/generic) restent.
                - filter: "IsOutBand == true && req.URL.Path startsWith '/_matrix/client/'"
                  apply:
                    - RemoveOutBandRuleByTag("OWASP_CRS")
                # --- Matrix hors API client (fédération, media, key) + admin Synapse ---
                # On GARDE le CRS actif (inspection du trafic inter-serveurs), en ne
                # retirant que les règles à FP avéré :
                #  - 911100 (method enforcement) : /_matrix/federation/v1/send/{txnId}
                #    est un PUT (spec Matrix), d'autres endpoints utilisent DELETE.
                #  - 930120 (LFI/OS file access) : un nom de champ type
                #    "...sessions.<id>.forwarded_count" contient ".forward" → faux match
                #    (ces noms transitent aussi dans les transactions de fédération).
                - filter: "IsOutBand == true && req.URL.Path startsWith '/_matrix/' && !(req.URL.Path startsWith '/_matrix/client/')"
                  apply:
                    - RemoveOutBandRuleByID(911100)
                    - RemoveOutBandRuleByID(930120)
                - filter: "IsOutBand == true && req.URL.Path startsWith '/_synapse/'"
                  apply:
                    - RemoveOutBandRuleByID(911100)
                    - RemoveOutBandRuleByID(930120)
                # --- Forgejo/Gitea Actions runner (gRPC/protobuf) ---
                # /api/actions/runner.v1.RunnerService/* en Content-Type
                # application/proto. Le CRS ne sait pas parser le protobuf binaire →
                # il lit le corps comme des ARGS et déclenche 920420 (content-type),
                # 921150 (faux CR/LF sur octets binaires) puis 949110 (score). Le CRS
                # n'apporte rien sur du binaire → on retire TOUT le CRS (tag OWASP_CRS)
                # UNIQUEMENT sur ce chemin.
                - filter: "IsOutBand == true && req.URL.Path startsWith '/api/actions/'"
                  apply:
                    - RemoveOutBandRuleByTag("OWASP_CRS")
                # --- Git smart HTTP (clone/fetch/push over HTTPS) ---
                # /{owner}/{repo}.git/{git-upload-pack,git-receive-pack,info/refs} :
                # Content-Type application/x-git-* + corps binaire (pack negotiation).
                # Le CRS ne sait pas parser le protocole Git → cascade de FP :
                # 920420 (content-type), 920450 (header Content-Encoding/Git-Protocol),
                # 920270 (null byte), 921150 (faux CR/LF), puis 949110 (score). Le
                # préfixe owner/repo varie → match par suffixe. On retire tout le CRS
                # (OWASP_CRS) UNIQUEMENT sur ces endpoints de transport Git ; l'UI web
                # et l'API Gitea restent protégées.
                - filter: "IsOutBand == true && (req.URL.Path endsWith '/git-upload-pack' || req.URL.Path endsWith '/git-receive-pack' || req.URL.Path endsWith '/info/refs')"
                  apply:
                    - RemoveOutBandRuleByTag("OWASP_CRS")
              on_match:
                # Whitelist 10.5.0.1 : gateway pfSense sur laquelle hairpine tout le
                # LAN de confiance (runner Gitea, Renovate, NetBird, clients LAN via
                # FQDN public). On annule alerte + événement AppSec pour cette IP →
                # ni la corrélation out-of-band ni un blocage inband ne la banniront.
                # ⚠️ Compromis assumé : le trafic interne hairpiné n'est plus inspecté
                # côté ban (angle mort si un hôte interne est compromis). Le lever :
                # split DNS / Pure NAT sans auto-outbound-NAT côté pfSense pour que
                # les clients internes gardent leur vraie IP (ban ciblé par machine).
                - filter: "req.RemoteAddr == '10.5.0.1'"
                  apply:
                    - CancelAlert()
                    - CancelEvent()
                - filter: "IsOutBand == true && req.RemoteAddr != '10.5.0.1'"
                  apply:
                    - SendAlert()
          acquisitions:
            - source: appsec
              listen_addr: "0.0.0.0:7422"
              path: /
              appsec_config: custom/full-appsec
              labels:
                type: appsec
          env:
            # Collections WAF du hub : virtual patching + règles génériques +
            # OWASP Core Rule Set (config crowdsecurity/crs + règle CRS + scénario
            # de corrélation out-of-band).
            - name: COLLECTIONS
              value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/appsec-crs"
            # Plugin d'exclusion CRS pour Nextcloud/WebDAV (c'est une appsec-rule,
            # pas une collection) → installé via APPSEC_RULES ; ses datafiles sont
            # inclus automatiquement par le CRS pour éviter les FP sur la synchro.
            - name: APPSEC_RULES
              value: "crowdsecurity/crs-exclusion-plugin-nextcloud"
        # Agent : DaemonSet qui parse les logs des pods et détecte les comportements
        agent:
          # Collections de parsers/scénarios installées au démarrage
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/traefik crowdsecurity/base-http-scenarios crowdsecurity/http-cve"
          # Sources de logs : access logs des pods Traefik 3
          acquisition:
            - namespace: traefik
              podName: traefik3-*
              program: traefik
          persistentVolume:
            config:
              enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: crowdsec
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      # Secret LAPI désormais déterministe (Job generate-once) → plus de churn
      selfHeal: true
