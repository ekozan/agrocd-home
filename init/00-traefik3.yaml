apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik3
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: traefik
    repoURL: https://traefik.github.io/charts
    targetRevision: 40.3.0
    helm:
      releaseName: traefik3
      valuesObject:
        service:
            spec:
              type: LoadBalancer
              ipFamilyPolicy: PreferDualStack
        ingressClass:  # @schema additionalProperties: false
          enabled: true
          isDefaultClass: false
          name: "traefik3"
        providers:               
          kubernetesIngress:
            ingressClass: traefik3
        experimental:
          abortOnPluginFailure: false
          fastProxy:
            enabled: false
            debug: false
          kubernetesGateway:
            enabled: false
          plugins: 
            traefik-oidc-auth:
              moduleName: "github.com/sevensolutions/traefik-oidc-auth"
              version: "v0.20.1"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: traefik
  # Sync policy
  syncPolicy:
    syncOptions:
      - CreateNamespace=true  
    automated: 
      prune: true
      selfHeal: false
