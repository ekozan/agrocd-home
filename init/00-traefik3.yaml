apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik3
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    chart: traefik
    repoURL: https://traefik.github.io/charts
    targetRevision: 40.3.0
    helm:
      releaseName: traefik3
      valuesObject:
        # Logs d'accès requis pour que l'agent CrowdSec parse le trafic
        logs:
          access:
            enabled: true
        service:
            spec:
              type: LoadBalancer
              ipFamilyPolicy: PreferDualStack
        ingressClass:  # @schema additionalProperties: false
          enabled: true
          isDefaultClass: true
          name: "traefik"
        experimental:
          abortOnPluginFailure: false
          fastProxy:
            enabled: false
            debug: false
          kubernetesGateway:
            enabled: false
          plugins:
            traefik-oidc-auth:
              moduleName: "github.com/sevensolutions/traefik-oidc-auth"
              version: "v0.20.1"
            crowdsec:
              moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
              version: "v1.6.0"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: traefik
  # Sync policy
  syncPolicy:
    # Pod Security Admission — phase A : inventaire sans blocage (warn + audit)
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/audit: restricted
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: false
