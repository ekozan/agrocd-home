apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-policies
  namespace: argocd
  annotations:
    # Les défauts (LimitRange) ne s'appliquent qu'aux pods créés ensuite.
    # Lors d'un bootstrap complet, les namespaces cibles sont créés plus
    # tard par les apps infra : la sync échoue puis converge via retry.
    argocd.argoproj.io/sync-wave: "12"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  source:
    repoURL: https://github.com/ekozan/agrocd-home.git
    targetRevision: HEAD
    path: ./init/resource-policies

  destination:
    server: https://kubernetes.default.svc
    # Le namespace réel de chaque LimitRange est porté par le manifest
    # lui-même (les PriorityClasses sont cluster-scoped) ; cette valeur
    # n'est qu'un défaut ArgoCD.
    namespace: argocd

  # Sync policy
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
    # Bootstrap : re-tente tant que les namespaces applicatifs (créés par
    # les apps infra) n'existent pas encore.
    retry:
      limit: 10
      backoff:
        duration: 10s
        maxDuration: 5m0s
        factor: 2
