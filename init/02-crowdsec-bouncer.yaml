# Auto-enregistrement du bouncer Traefik auprès du LAPI CrowdSec.
#
# Le LAPI génère une clé API ; ce Job la récupère via cscli puis crée le
# Middleware Traefik qui porte la clé. Le Middleware n'est PAS suivi par git
# (créé au runtime), il n'entre donc pas en conflit avec le self-heal d'ArgoCD.
---
# Page servie par le bouncer (banHTMLFilePath) lors d'un blocage.
# Le plugin n'expose qu'UNE option de page, mais le fichier est rendu comme un
# template Go recevant {{ .RemediationReason }} ("LAPI" = ban IP, "APPSEC" =
# blocage WAF/AppSec) et {{ .ClientIP }} -> on branche l'affichage pour avoir un
# message distinct selon l'origine (un 2e fichier ne serait jamais servi).
# Logo CrowdSec officiel inline (monochrome) -> page autonome, sans CDN externe.
# Montee dans les pods Traefik via les values du chart (cf. 00-traefik3.yaml :
# volumes -> /etc/traefik/crowdsec/ban.html). Wave 0 : doit exister avant que
# les pods Traefik ne montent le volume.
apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-ban-page
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  ban.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="robots" content="noindex, nofollow">
      <title>Accès bloqué</title>
      <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
          margin: 0; min-height: 100vh; display: flex;
          align-items: center; justify-content: center;
          font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          background: radial-gradient(circle at 50% -10%, #1b2430, #0b0f14 70%);
          color: #e6edf3; text-align: center; padding: 1.5rem;
        }
        .card {
          max-width: 30rem; width: 100%; padding: 2.75rem 2rem 2rem;
          background: rgba(255,255,255,0.025);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 18px; backdrop-filter: blur(6px);
          box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
        }
        .cs-logo { width: 76px; height: auto; color: #f4f7fa; }
        h1 { margin: 1.25rem 0 0.5rem; font-size: 1.55rem; font-weight: 650; }
        p { margin: 0.4rem 0; color: #9fb0c0; line-height: 1.55; font-size: 0.97rem; }
        .divider {
          height: 1px; margin: 1.75rem 0 1rem;
          background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }
        .meta { display: flex; flex-direction: column; gap: 0.25rem;
          font-size: 0.78rem; color: #6b7a8a; letter-spacing: 0.04em; }
        .meta strong { color: #9fb0c0; font-weight: 600; }
        .brand { margin-top: 0.4rem; text-transform: uppercase; letter-spacing: 0.12em; }
      </style>
    </head>
