# Enregistrement du bouncer Traefik auprès du LAPI CrowdSec.
#
# La clé API du bouncer est STABLE : générée une seule fois et conservée dans
# le Secret crowdsec-bouncer-key. Le Job (ré)enregistre le bouncer avec cette
# clé et crée le Middleware Traefik porteur de la même clé. Pas de rotation à
# chaque sync (sinon clé middleware != clé LAPI -> 403 -> bouncer jamais actif).
# Le Middleware n'est PAS suivi par git (créé au runtime) -> pas de conflit
# avec le self-heal d'ArgoCD.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
---
# Droits côté CrowdSec : lire les pods, exec cscli dans le pod LAPI,
# et gérer le Secret qui porte la clé stable du bouncer
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-bouncer-register
subjects:
  - kind: ServiceAccount
    name: crowdsec-bouncer-register
    namespace: crowdsec
---
# Droits côté Traefik : gérer le Middleware qui porte la clé du bouncer
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-bouncer-register
  namespace: traefik
rules:
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-bouncer-register
  namespace: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-bouncer-register
subjects:
  - kind: ServiceAccount
    name: crowdsec-bouncer-register
    namespace: crowdsec
---
apiVersion: batch/v1
kind: Job
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
  annotations:
    # Rejoué après chaque sync, une fois le LAPI déployé ; supprimé si succès
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: crowdsec-bouncer-register
      restartPolicy: Never
      containers:
        - name: register
          image: alpine/kubectl:1.33.4
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              echo "Attente du LAPI CrowdSec..."
              kubectl -n crowdsec wait --for=condition=ready pod \
                -l type=lapi --timeout=300s

              LAPI_POD=$(kubectl -n crowdsec get pod -l type=lapi \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Pod LAPI : ${LAPI_POD}"

              # Clé STABLE du bouncer : générée une seule fois, jamais rotationnée
              KEY=$(kubectl -n crowdsec get secret crowdsec-bouncer-key \
                -o jsonpath='{.data.apiKey}' 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -z "${KEY}" ]; then
                KEY=$(head -c 96 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 48)
                kubectl -n crowdsec create secret generic crowdsec-bouncer-key \
                  --from-literal=apiKey="${KEY}"
                echo "Clé bouncer générée (stable)."
              fi

              # (Ré)enregistre le bouncer avec CETTE clé stable -> middleware et
              # LAPI portent toujours la même clé (auto-réparation, pas de 403)
              kubectl -n crowdsec exec "${LAPI_POD}" -- \
                cscli bouncers delete traefik-bouncer >/dev/null 2>&1 || true
              kubectl -n crowdsec exec "${LAPI_POD}" -- \
                cscli bouncers add traefik-bouncer --key "${KEY}" >/dev/null
              echo "Bouncer 'traefik-bouncer' enregistré avec la clé stable."

              # Crée/met à jour le Middleware Traefik porteur de la clé
              cat <<EOF | kubectl apply -f -
              apiVersion: traefik.io/v1alpha1
              kind: Middleware
              metadata:
                name: crowdsec
                namespace: traefik
              spec:
                plugin:
                  crowdsec:
                    enabled: "true"
                    logLevel: INFO
                    crowdsecMode: stream
                    crowdsecLapiScheme: http
                    crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
                    crowdsecLapiKey: "${KEY}"
              EOF
              echo "Middleware traefik/crowdsec appliqué."
