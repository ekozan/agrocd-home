# Auto-enregistrement du bouncer Traefik auprès du LAPI CrowdSec.
#
# Le LAPI génère une clé API ; ce Job la récupère via cscli puis crée le
# Middleware Traefik qui porte la clé. Le Middleware n'est PAS suivi par git
# (créé au runtime), il n'entre donc pas en conflit avec le self-heal d'ArgoCD.
---
# Page servie par le bouncer (banHTMLFilePath) lors d'un blocage.
# Le plugin n'expose qu'UNE option de page, mais le fichier est rendu comme un
# template Go recevant {{ .RemediationReason }} ("LAPI" = ban IP, "APPSEC" =
# blocage WAF/AppSec) et {{ .ClientIP }} → on branche l'affichage pour avoir un
# message distinct selon l'origine (un 2e fichier ne serait jamais servi).
# Montée dans les pods Traefik via les values du chart (cf. 00-traefik3.yaml :
# volumes → /etc/traefik/crowdsec/ban.html). Wave 0 : doit exister avant que
# les pods Traefik ne montent le volume.
apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-ban-page
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  ban.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="robots" content="noindex, nofollow">
      <title>Accès bloqué</title>
      <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
          margin: 0; min-height: 100vh; display: flex;
          align-items: center; justify-content: center;
          font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          background: radial-gradient(circle at 50% 0%, #1b2430, #0b0f14);
          color: #e6edf3; text-align: center; padding: 1.5rem;
        }
        .card {
          max-width: 32rem; padding: 2.5rem 2rem;
          background: rgba(255,255,255,0.03);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 16px; backdrop-filter: blur(6px);
        }
        .icon { font-size: 3.5rem; line-height: 1; }
        h1 { margin: 1rem 0 0.5rem; font-size: 1.6rem; }
        p { margin: 0.4rem 0; color: #9fb0c0; line-height: 1.5; }
        .code { margin-top: 1.5rem; font-size: 0.8rem; color: #6b7a8a;
          letter-spacing: 0.05em; }
      </style>
    </head>
    <body>
      <main class="card">
        {{ if eq .RemediationReason "APPSEC" }}
        <div class="icon">&#128737;</div>
        <h1>Requête bloquée</h1>
        <p>Votre requête a été interceptée par notre pare-feu applicatif (WAF)
        car elle correspond à un schéma de requête malveillant.</p>
        {{ else }}
        <div class="icon">&#128683;</div>
        <h1>Accès bloqué</h1>
        <p>Votre adresse IP a été bloquée par notre système de protection
        en raison d'une activité jugée suspecte.</p>
        {{ end }}
        <p>S'il s'agit d'une erreur, contactez l'administrateur du service.</p>
        {{ if .ClientIP }}<p class="code">IP : {{ .ClientIP }}</p>{{ end }}
        <p class="code">HTTP 403 &middot; CrowdSec &middot; {{ .RemediationReason }}</p>
      </main>
    </body>
    </html>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
---
# Droits côté CrowdSec : lire les pods et exec cscli dans le pod LAPI
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-bouncer-register
subjects:
  - kind: ServiceAccount
    name: crowdsec-bouncer-register
    namespace: crowdsec
---
# Droits côté Traefik : gérer le Middleware qui porte la clé du bouncer
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-bouncer-register
  namespace: traefik
rules:
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-bouncer-register
  namespace: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-bouncer-register
subjects:
  - kind: ServiceAccount
    name: crowdsec-bouncer-register
    namespace: crowdsec
---
apiVersion: batch/v1
kind: Job
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
  annotations:
    # Rejoué après chaque sync, une fois le LAPI déployé ; supprimé si succès
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: crowdsec-bouncer-register
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: register
          image: alpine/kubectl:1.33.4
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # HOME inscriptible pour le cache kubectl (rootfs en lecture seule)
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command: ["/bin/sh", "-c"]
          args: 
            - |
              set -eu
              echo "Attente du LAPI CrowdSec..."
              kubectl -n crowdsec wait --for=condition=ready pod \
                -l type=lapi --timeout=300s

              LAPI_POD=$(kubectl -n crowdsec get pod -l type=lapi \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Pod LAPI : ${LAPI_POD}"

              # Clé STABLE du bouncer : générée une seule fois, jamais rotationnée
              KEY=$(kubectl -n crowdsec get secret crowdsec-bouncer-key \
                -o jsonpath='{.data.apiKey}' 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -z "${KEY}" ]; then
                KEY=$(head -c 96 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 48)
                kubectl -n crowdsec create secret generic crowdsec-bouncer-key \
                  --from-literal=apiKey="${KEY}"
                echo "Clé bouncer générée (stable)."
              fi

              # (Ré)enregistre le bouncer avec CETTE clé stable -> middleware et
              # LAPI portent toujours la même clé (auto-réparation, pas de 403)
              kubectl -n crowdsec exec "${LAPI_POD}" -- \
                cscli bouncers delete traefik-bouncer >/dev/null 2>&1 || true
              kubectl -n crowdsec exec "${LAPI_POD}" -- \
                cscli bouncers add traefik-bouncer --key "${KEY}" >/dev/null
              echo "Bouncer 'traefik-bouncer' enregistré avec la clé stable."

              # Crée/met à jour le Middleware Traefik porteur de la clé
              cat <<EOF | kubectl apply -f -
              apiVersion: traefik.io/v1alpha1
              kind: Middleware
              metadata:
                name: crowdsec
                namespace: traefik
              spec:
                plugin:
                  crowdsec:
                    enabled: "true"
                    logLevel: INFO
                    # Page HTML servie aux IP bannies (montée via le chart Traefik)
                    banHTMLFilePath: /etc/traefik/crowdsec/ban.html
                    crowdsecMode: stream
                    crowdsecLapiScheme: http
                    crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
                    crowdsecLapiKey: "${KEY}"
                    # --- AppSec (WAF) ---
                    crowdsecAppsecEnabled: "true"
                    crowdsecAppsecHost: crowdsec-appsec-service.crowdsec.svc.cluster.local:7422
                    crowdsecAppsecScheme: http
                    crowdsecAppsecFailureBlock: "true"
                    crowdsecAppsecUnreachableBlock: "true"
              EOF
              echo "Middleware traefik/crowdsec appliqué."
      volumes:
        - name: tmp
          emptyDir: {}
