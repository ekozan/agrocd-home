        {{ if eq .RemediationReason "APPSEC" }}
        <h1>Requête bloquée</h1>
        <p>Votre requête a été interceptée par notre pare-feu applicatif (WAF)
        car elle correspond à un schéma de requête malveillant.</p>
        {{ else }}
        <h1>Accès bloqué</h1>
        <p>Votre adresse IP a été bloquée par notre système de protection
        en raison d'une activité jugée suspecte.</p>
        {{ end }}
        <p>S'il s'agit d'une erreur, contactez l'administrateur du service.</p>
        <div class="divider"></div>
        <div class="meta">
          {{ if .ClientIP }}<span>IP : <strong>{{ .ClientIP }}</strong></span>{{ end }}
          <span>HTTP 403 &middot; motif : {{ .RemediationReason }}</span>
          <span class="brand">Propulsé par CrowdSec</span>
        </div>
      </main>
    </body>
    </html>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
---
# Droits côté CrowdSec : lire les pods et exec cscli dans le pod LAPI
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-bouncer-register
subjects:
  - kind: ServiceAccount
    name: crowdsec-bouncer-register
    namespace: crowdsec
---
# Droits côté Traefik : gérer le Middleware qui porte la clé du bouncer
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-bouncer-register
  namespace: traefik
rules:
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-bouncer-register
  namespace: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-bouncer-register
subjects:
  - kind: ServiceAccount
    name: crowdsec-bouncer-register
    namespace: crowdsec
---
apiVersion: batch/v1
kind: Job
metadata:
  name: crowdsec-bouncer-register
  namespace: crowdsec
  annotations:
    # Rejoué après chaque sync, une fois le LAPI déployé ; supprimé si succès
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: crowdsec-bouncer-register
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: register
          image: alpine/kubectl:1.36.2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # HOME inscriptible pour le cache kubectl (rootfs en lecture seule)
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command: ["/bin/sh", "-c"]
          args: 
            - |
              set -eu
              echo "Attente du LAPI CrowdSec..."
              kubectl -n crowdsec wait --for=condition=ready pod \
                -l type=lapi --timeout=300s

              LAPI_POD=$(kubectl -n crowdsec get pod -l type=lapi \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Pod LAPI : ${LAPI_POD}"

              # Clé STABLE du bouncer : générée une seule fois, jamais rotationnée
              KEY=$(kubectl -n crowdsec get secret crowdsec-bouncer-key \
                -o jsonpath='{.data.apiKey}' 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -z "${KEY}" ]; then
                KEY=$(head -c 96 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 48)
                kubectl -n crowdsec create secret generic crowdsec-bouncer-key \
                  --from-literal=apiKey="${KEY}"
                echo "Clé bouncer générée (stable)."
              fi

              # (Ré)enregistre le bouncer avec CETTE clé stable -> middleware et
              # LAPI portent toujours la même clé (auto-réparation, pas de 403)
              kubectl -n crowdsec exec "${LAPI_POD}" -- \
                cscli bouncers delete traefik-bouncer >/dev/null 2>&1 || true
              kubectl -n crowdsec exec "${LAPI_POD}" -- \
                cscli bouncers add traefik-bouncer --key "${KEY}" >/dev/null
              echo "Bouncer 'traefik-bouncer' enregistré avec la clé stable."

              # Crée/met à jour le Middleware Traefik porteur de la clé
              cat <<EOF | kubectl apply -f -
              apiVersion: traefik.io/v1alpha1
              kind: Middleware
              metadata:
                name: crowdsec
                namespace: traefik
              spec:
                plugin:
                  crowdsec:
                    enabled: "true"
                    logLevel: INFO
                    # Page HTML servie aux IP bannies (montée via le chart Traefik)
                    banHTMLFilePath: /etc/traefik/crowdsec/ban.html
                    crowdsecMode: stream
                    crowdsecLapiScheme: http
                    crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
                    crowdsecLapiKey: "${KEY}"
                    # --- AppSec (WAF) ---
                    crowdsecAppsecEnabled: "true"
                    crowdsecAppsecHost: crowdsec-appsec-service.crowdsec.svc.cluster.local:7422
                    crowdsecAppsecScheme: http
                    crowdsecAppsecFailureBlock: "true"
                    crowdsecAppsecUnreachableBlock: "true"
              EOF
              echo "Middleware traefik/crowdsec appliqué."
      volumes:
        - name: tmp
          emptyDir: {}
