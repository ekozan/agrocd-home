# Génère une fois pour toutes le secret LAPI de CrowdSec (registrationToken +
# csLapiSecret) consommé par le chart via secrets.externalSecret.name.
#
# Pourquoi : le chart randomise ces valeurs à chaque render, mais sous ArgoCD
# (`helm template`, sans accès cluster) le `lookup` de stabilisation renvoie
# vide → nouvelle valeur à chaque réconciliation → churn. En fournissant un
# Secret qu'on gère nous-mêmes (référencé par secretKeyRef au runtime), le
# render redevient déterministe et selfHeal peut rester actif.
---
apiVersion: v1
kind: Namespace
metadata:
  name: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-lapi-secret-gen
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-lapi-secret-gen
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-lapi-secret-gen
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-lapi-secret-gen
subjects:
  - kind: ServiceAccount
    name: crowdsec-lapi-secret-gen
    namespace: crowdsec
---
apiVersion: batch/v1
kind: Job
metadata:
  name: crowdsec-lapi-secret-gen
  namespace: crowdsec
  annotations:
    # Doit être Complete avant la wave 1 (déploiement du LAPI)
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: crowdsec-lapi-secret-gen
      restartPolicy: Never
      containers:
        - name: generate
          image: alpine/kubectl:1.31
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              if kubectl -n crowdsec get secret crowdsec-lapi-secrets >/dev/null 2>&1; then
                echo "Secret crowdsec-lapi-secrets déjà présent — rien à faire."
                exit 0
              fi

              # registrationToken (>48 car.) et csLapiSecret (>64 car.)
              REG=$(head -c 96 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 64)
              SECRET=$(head -c 128 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 96)

              kubectl -n crowdsec create secret generic crowdsec-lapi-secrets \
                --from-literal=registrationToken="$REG" \
                --from-literal=csLapiSecret="$SECRET"
              echo "Secret crowdsec-lapi-secrets généré."
