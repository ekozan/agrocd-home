apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: matrix
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  source:
    chart: conduwuit
    repoURL: oci://ghcr.io/magikid/modern-conduwuit-helm
    targetRevision: "1.7.1"
    helm:
      releaseName: matrix
      valuesObject:
        # ============================================================
        # Tuwunel (conduwuit) — homeserver léger en Rust
        # Domaine      : matrix.ffd.link  (server_name: ffd.link)
        # IdP OIDC     : Zitadel @ id.ffd.link (OIDC natif, sans MAS)
        # Ingress      : Traefik
        # TLS          : cert-manager + Let's Encrypt
        # DB           : RocksDB embarqué (PVC 2Gi)
        # Médias       : PVC NFS democratic-csi 50Gi (NAS)
        # Fédération   : activée
        # ============================================================

        image:
          repository: ghcr.io/matrix-construct/tuwunel
          tag: v1.7.1

        config:
          server_name: "ffd.link"
          allow_registration: false
          allow_federation: true
          log: "warn"

          # OIDC natif Tuwunel — pas de MAS requis
          well_known:
            client: "https://matrix.ffd.link"
          identity_provider:
            - id: zitadel
              name: "FFD Link"
              issuer: "https://id.ffd.link"
              client_id: "matrix-tuwunel"
              # client_secret chargé via ExternalSecret → Secret Kubernetes
              client_secret_env: "TUWUNEL_OIDC_CLIENT_SECRET"
              scopes:
                - openid
                - profile
                - email

        # Secret Kubernetes contenant TUWUNEL_OIDC_CLIENT_SECRET
        extraEnvFrom:
          - secretRef:
              name: tuwunel-oidc-secret

        persistence:
          data:
            enabled: true
            storageClassName: longhorn
            size: 2Gi
            accessMode: ReadWriteOnce
          media:
            enabled: true
            storageClassName: freenas-nfs-csi
            size: 50Gi
            accessMode: ReadWriteMany

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi

        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: matrix.ffd.link
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: matrix-ffd-link-tls
              hosts:
                - matrix.ffd.link

        # Well-known pour la fédération (server_name: ffd.link)
        wellKnown:
          enabled: true
          ingress:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: ffd.link
                paths:
                  - path: /.well-known/matrix
                    pathType: Prefix
            tls:
              - secretName: ffd-link-wellknown-tls
                hosts:
                  - ffd.link
