apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"    
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: matrix
    # Sync policy
  syncPolicy:
    syncOptions:
      - CreateNamespace=true  
    automated: 
      prune: true
      selfHeal: true
  source:
    chart: matrix-stack
    repoURL: ghcr.io/element-hq/ess-helm
    targetRevision: 26.5.1
    helm:
      releaseName: matrix
      valuesObject:    
        # ============================================================
        # ESS Community — matrix-stack values.yaml
        # Domaine      : matrix.ffd.link  (server_name: ffd.link)
        # IdP OIDC     : Zitadel @ id.ffd.link
        # Ingress      : Traefik
        # TLS          : cert-manager + Let's Encrypt
        # DB           : SQLite (embarqué, PVC Longhorn 2Gi)
        # Médias       : PVC NFS democratic-csi 50Gi (NAS)
        # MAS          : désactivé (Zitadel gère l'OIDC)
        # Fédération   : activée
        # ============================================================
         
        synapse:
          enabled: true
         
          serverName: ffd.link
          publicBaseUrl: "https://matrix.ffd.link"
         
          config:
            enableRegistration: false
         
            # SQLite embarqué — pas de PostgreSQL
            database:
              name: sqlite3
              args:
                database: /data/homeserver.db
         
            federation:
              enabled: true
         
            oidcProviders:
              - idp_id: zitadel
                idp_name: "FFD Link"
                discover: true
                issuer: "https://id.ffd.link"
                client_id: "matrix-synapse"
                client_secret_path: "/secrets/matrix/zitadel-client-secret"
                scopes:
                  - openid
                  - profile
                  - email
                user_mapping_provider:
                  config:
                    localpart_template: "{{ user.preferred_username }}"
                    display_name_template: "{{ user.name }}"
                    email_template: "{{ user.email }}"
         
            logLevel: WARNING
         
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
         
          # PVC data (SQLite) — Longhorn, petit et rapide
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 2Gi
            accessMode: ReadWriteOnce
         
          # PVC médias — NAS via democratic-csi NFS
          media:
            persistence:
              enabled: true
              storageClassName: freenas-nfs-csi   # ← directement ici
              size: 50Gi
              accessMode: ReadWriteMany
                 
        # -- Well-known fédération
        wellKnownDelegation:
          enabled: true
          ingress:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: ffd.link
                paths:
                  - path: /.well-known/matrix
                    pathType: Prefix
            tls:
              - secretName: ffd-link-tls
         
        # -- Synapse ingress
          ingress:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: matrix.ffd.link
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: ffd-link-tls
         
        # -- Element Web
        elementWeb:
          enabled: true
         
          config:
            default_server_config:
              m.homeserver:
                base_url: "https://matrix.ffd.link"
                server_name: "ffd.link"
            brand: "FFD Chat"
            default_theme: dark
         
          ingress:
            enabled: true
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: chat.ffd.link
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: ffd-link-tls
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
         
        # -- MAS désactivé
        mas:
          enabled: false
         
        # -- PostgreSQL désactivé
        postgresql:
          enabled: false
         
        # -- Coturn désactivé
        coturn:
          enabled: false
 
