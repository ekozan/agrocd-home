---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: matrix
  labels:
    # Pod Security Admission — phase A : inventaire sans blocage (warn + audit).
    # Passer en enforce: restricted une fois tuwunel/livekit durcis et validés.
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# ExternalSecret — génère tuwunel.toml avec client_id/secret interpolés
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tuwunel-config
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: tuwunel-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        tuwunel.toml: |
          [global]
          server_name = "ffd.link"
          database_path = "/data"
          address = ["0.0.0.0"]
          port = 8008
          allow_registration = false
          allow_federation = true
          log = "warn"

          [global.well_known]
          client = "https://matrix.ffd.link"
          server = "matrix.ffd.link:443"
          livekit_url = "https://matrix-rtc.ffd.link"  
          
          [[global.identity_provider]]
          id = "zitadel"
          name = "FFD Link"
          brand = "zitadel"
          issuer_url = "https://idp.ffd.link"
          client_id = "{{ .client_id }}"
          client_secret = "{{ .client_secret }}"
          scopes = ["openid", "profile", "email"]
  data:
    - secretKey: client_id
      remoteRef:
        key: kubernetes/matrix/zitadel
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: kubernetes/matrix/zitadel
        property: client_secret
---
# PersistentVolumeClaim — base de données RocksDB (Longhorn)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tuwunel-data
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# PersistentVolumeClaim — médias (TrueNAS NFS)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tuwunel-media
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: freenas-nfs-csi
  resources:
    requests:
      storage: 50Gi
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuwunel
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tuwunel
  template:
    metadata:
      labels:
        app: tuwunel
    spec:
      # ── Durcissement (à activer après test) ─────────────────────────────
      # Tuwunel écrit sur /data (RocksDB, PVC Longhorn) et /media (PVC NFS).
      # runAsNonRoot impose un fsGroup pour que l'UID non-root puisse écrire,
      # MAIS le fsGroup se comporte mal sur NFS (freenas-nfs-csi) → à valider
      # avant d'activer, sinon CrashLoop sur l'écriture des médias.
      # securityContext:
      #   runAsNonRoot: true
      #   runAsUser: 65532
      #   runAsGroup: 65532
      #   fsGroup: 65532
      #   seccompProfile:
      #     type: RuntimeDefault
      containers:
        - name: tuwunel
          image: ghcr.io/matrix-construct/tuwunel:v1.7.1
          # securityContext:
          #   allowPrivilegeEscalation: false
          #   readOnlyRootFilesystem: true   # config en RO ; data/media sont des volumes
          #   capabilities:
          #     drop: ["ALL"]
          args:
            - --config
            - /etc/tuwunel/tuwunel.toml
          ports:
            - containerPort: 8008
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/tuwunel
              readOnly: true
            - name: data
              mountPath: /data
            - name: media
              mountPath: /media
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          secret:
            secretName: tuwunel-config
        - name: data
          persistentVolumeClaim:
            claimName: tuwunel-data
        - name: media
          persistentVolumeClaim:
            claimName: tuwunel-media
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: tuwunelservice
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: tuwunel
  ports:
    - name: http
      port: 8008
      targetPort: 8008
---
# Ingress — homeserver matrix.ffd.link
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tuwunel
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: matrix.ffd.link
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tuwunelservice
                port:
                  number: 8008
  tls:
    - secretName: ffd-link-tls
      hosts:
        - matrix.ffd.link
---
# Ingress — well-known fédération sur ffd.link
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tuwunel-wellknown
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: ffd.link
      http:
        paths:
          - path: /.well-known/matrix
            pathType: Prefix
            backend:
              service:
                name: tuwunelservice
                port:
                  number: 8008
  tls:
    - secretName: ffd-link-tls
      hosts:
        - ffd.link
