---
# Wildcard *.ffd.link émis par Let's Encrypt (ClusterIssuer "prod", DNS-01 OVH).

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ffd-link
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  secretName: ffd-link-tls
  issuerRef:
    name: prod
    kind: ClusterIssuer
  commonName: "*.ffd.link"
  dnsNames:
    - "ffd.link"
    - "*.ffd.link"
  secretTemplate:
    annotations:
      # Réplication limitée aux namespaces dont un Ingress référence
      # ffd-link-tls (+ traefik pour un éventuel TLSStore par défaut).
      # Pas de ".*" : inutile de diffuser la clé privée du wildcard partout.
      replicator.v1.mittwald.de/replicate-to: "traefik,zitadel,gitea,coder,crowdsec,matrix,oxicloud,euro-office"
