---
# default-deny ingress dans le namespace euro-office.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: euro-office
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Trafic intra-namespace autorisé.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: euro-office
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Traefik → Euro-Office HTTP (office.ffd.link).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik
  namespace: euro-office
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 80
---
# OxiCloud → Euro-Office : découverte WOPI + ouverture de l'éditeur
# (hosting/discovery, API document server).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-oxicloud
  namespace: euro-office
spec:
  podSelector:
    matchLabels:
      app: euro-office
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: oxicloud
      ports:
        - protocol: TCP
          port: 80
