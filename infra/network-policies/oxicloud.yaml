---
# default-deny ingress dans le namespace oxicloud.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: oxicloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Trafic intra-namespace autorisé.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: oxicloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Traefik → OxiCloud HTTP (cloud.ffd.link).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik
  namespace: oxicloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8086
---
# Euro-Office → OxiCloud : rappels WOPI (CheckFileInfo / GetFile / PutFile)
# du serveur de documents vers l'hôte WOPI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-euro-office-wopi
  namespace: oxicloud
spec:
  podSelector:
    matchLabels:
      app: oxicloud
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: euro-office
      ports:
        - protocol: TCP
          port: 8086
