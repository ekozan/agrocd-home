---
# default-deny ingress : aucune connexion entrante par défaut dans crowdsec.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: crowdsec
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Trafic intra-namespace autorisé (agent CrowdSec → LAPI).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: crowdsec
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Le bouncer (plugin embarqué dans les pods Traefik) interroge le LAPI :8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-lapi
  namespace: crowdsec
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
