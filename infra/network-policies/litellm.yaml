---
# default-deny ingress dans le namespace litellm. Le proxy détient la clé API
# Anthropic : verrouiller son ingress limite l'abus (coût/exfiltration) depuis
# un pod compromis ailleurs dans le cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: litellm
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Trafic intra-namespace autorisé.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: litellm
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# HYPOTHÈSE : le consommateur du proxy LiteLLM (:4000) est Coder. LiteLLM n'a
# pas d'Ingress public dans ce repo (Service ClusterIP). Si d'autres namespaces
# doivent l'appeler, les ajouter ici.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-coder-to-litellm
  namespace: litellm
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: coder
      ports:
        - protocol: TCP
          port: 4000
