apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-policies
  namespace: argocd
  annotations:
    # Après les workloads : tous les namespaces cibles existent déjà.
    # Les défauts (LimitRange) ne s'appliquent qu'aux pods créés ensuite.
    argocd.argoproj.io/sync-wave: "12"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  source:
    repoURL: https://github.com/ekozan/agrocd-home.git
    targetRevision: HEAD
    path: ./infra/resource-policies

  destination:
    server: https://kubernetes.default.svc
    # Le namespace réel de chaque LimitRange est porté par le manifest
    # lui-même (les PriorityClasses sont cluster-scoped) ; cette valeur
    # n'est qu'un défaut ArgoCD.
    namespace: argocd

  # Sync policy
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
