# Credentials S3 du backup CNPG (barmanObjectStore), sourcés depuis OpenBao.
# Pré-requis : kv/kubernetes/cnpg/backup-s3 { access_key, secret_key }.
# Référencé par spec.backup.barmanObjectStore.s3Credentials du Cluster pg-main.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: kubernetes/cnpg/backup-s3
        property: access_key
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: kubernetes/cnpg/backup-s3
        property: secret_key
