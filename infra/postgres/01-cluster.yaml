# Instance PostgreSQL centralisée (CloudNativePG).
# Une seule instance héberge toutes les bases applicatives (Database CRD,
# fichiers 02-db-<app>.yaml), chacune avec son rôle propriétaire dédié.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-main
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised

  # Secret superuser `postgres` généré par CNPG (pg-main-superuser).
  # Utilisé par l'admin Zitadel et par les Jobs de migration.
  enableSuperuserAccess: true

  # Certificat serveur TLS émis par cert-manager (my-ca-issuer, voir
  # 00-certificate.yaml) plutôt que par la CA auto-signée interne de CNPG.
  # Le même Secret fournit tls.crt/tls.key (serveur) et ca.crt (CA).
  # Les certificats client/réplication restent gérés par CNPG.
  certificates:
    serverCASecret: pg-main-server-cert
    serverTLSSecret: pg-main-server-cert

  storage:
    size: 10Gi
    storageClass: longhorn

  # Backup continu vers l'object store S3 (MinIO/TrueNAS) : base + archivage
  # WAL → restauration à un instant arbitraire (PITR). Le backup complet
  # quotidien est déclenché par le ScheduledBackup (03-scheduled-backup.yaml) ;
  # credentials via l'ExternalSecret cnpg-backup-s3 (00-backup-s3-secret.yaml).
  # ⚠ Provisionner kv/kubernetes/cnpg/backup-s3 dans OpenBao et créer le
  # bucket AVANT de synchroniser, sinon l'archivage WAL passe en erreur.
  # >>> Adapter bucket et endpoint à votre infrastructure <<<
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://cnpg/pg-main
      endpointURL: https://s3.ffd.link:9000
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip

  postgresql:
    parameters:
      max_connections: "200"

  # Rôles applicatifs. Mots de passe fournis via les Secrets basic-auth
  # générés par le Job pg-secret-init (00-secrets-init.yaml). CNPG ne génère
  # pas de mot de passe pour les rôles managés ; il les applique depuis ces
  # Secrets (label cnpg.io/reload=true).
  managed:
    roles:
      - name: zitadel
        ensure: present
        login: true
        passwordSecret:
          name: zitadel-db
      - name: coder
        ensure: present
        login: true
        passwordSecret:
          name: coder-db
      - name: gitea
        ensure: present
        login: true
        passwordSecret:
          name: gitea-db
      - name: litellm
        ensure: present
        login: true
        passwordSecret:
          name: litellm-db
      - name: oxicloud
        ensure: present
        login: true
        passwordSecret:
          name: oxicloud-db
      # Nom avec tiret = identifiant PG cité automatiquement par CNPG ; le nom
      # du rôle doit correspondre au namespace (réplication du secret par le
      # hook pg-secret-init → ns euro-office).
      - name: euro-office
        ensure: present
        login: true
        passwordSecret:
          name: euro-office-db

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
