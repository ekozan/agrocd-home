# Instance PostgreSQL centralisée (CloudNativePG).
# Une seule instance héberge toutes les bases applicatives (Database CRD,
# fichiers 02-db-<app>.yaml), chacune avec son rôle propriétaire dédié.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-main
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised

  # Secret superuser `postgres` généré par CNPG (pg-main-superuser).
  # Utilisé par l'admin Zitadel et par les Jobs de migration.
  enableSuperuserAccess: true

  # Certificat serveur TLS émis par cert-manager (my-ca-issuer, voir
  # 00-certificate.yaml) plutôt que par la CA auto-signée interne de CNPG.
  # Le même Secret fournit tls.crt/tls.key (serveur) et ca.crt (CA).
  # Les certificats client/réplication restent gérés par CNPG.
  certificates:
    serverCASecret: pg-main-server-cert
    serverTLSSecret: pg-main-server-cert

  storage:
    size: 10Gi
    storageClass: longhorn

  postgresql:
    parameters:
      max_connections: "200"

  # Rôles applicatifs. Mots de passe fournis via les Secrets basic-auth
  # générés par le Job pg-secret-init (00-secrets-init.yaml). CNPG ne génère
  # pas de mot de passe pour les rôles managés ; il les applique depuis ces
  # Secrets (label cnpg.io/reload=true).
  managed:
    roles:
      - name: zitadel
        ensure: present
        login: true
        passwordSecret:
          name: zitadel-db
      - name: coder
        ensure: present
        login: true
        passwordSecret:
          name: coder-db
      - name: gitea
        ensure: present
        login: true
        passwordSecret:
          name: gitea-db
      - name: litellm
        ensure: present
        login: true
        passwordSecret:
          name: litellm-db

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
