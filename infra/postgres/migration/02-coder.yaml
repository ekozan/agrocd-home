# Migration Coder : postgresql.coder.svc (Bitnami, sans TLS) -> pg-main / base coder.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-coder
  namespace: coder
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/cloudnative-pg/postgresql:16
          env:
            - name: SRC_PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-auth
                  key: password
            - name: DST_PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: coder-db
                  key: password
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              echo ">> dump source (coder)"
              PGPASSWORD="$SRC_PGPASSWORD" pg_dump -Fc --no-owner --no-privileges \
                "host=postgresql.coder.svc user=coder dbname=coder sslmode=disable" \
                > /tmp/coder.dump
              echo ">> restore vers pg-main"
              PGPASSWORD="$DST_PGPASSWORD" pg_restore --no-owner --no-privileges --exit-on-error \
                -h pg-main-rw.database.svc -U coder -d coder /tmp/coder.dump
              echo ">> OK"
