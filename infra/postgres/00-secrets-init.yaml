---
# Génère les Secrets de mot de passe des rôles « managed » du Cluster CNPG.
# Le Job lit dynamiquement spec.managed.roles du Cluster pg-main et crée, pour
# chaque rôle, le Secret kubernetes.io/basic-auth manquant (mot de passe
# aléatoire). Il est exécuté en hook PostSync à CHAQUE synchronisation et
# régénère donc tout secret manquant : pour ajouter un user, il suffit
# d'ajouter le rôle dans 01-cluster.yaml — aucune action manuelle sur ce Job.
#
# Convention : le Secret se nomme d'après spec.managed.roles[].passwordSecret.name
# (= "<rôle>-db") et est répliqué (kubernetes-replicator) vers le namespace
# homonyme du rôle (zitadel -> ns zitadel, etc.).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch"]
  # Lecture du Cluster pour découvrir les rôles et leurs passwordSecret
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: pg-secret-init
    namespace: database
roleRef:
  kind: Role
  name: pg-secret-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    # Hook PostSync : rejoué à chaque sync (donc à chaque ajout de rôle) ;
    # l'instance précédente est supprimée avant d'en recréer une.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: pg-secret-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: alpine/k8s:1.36.2
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              gen() { tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 32; }

              # Découvre les rôles déclarés dans le Cluster : "<rôle> <secret>"
              kubectl -n database get clusters.postgresql.cnpg.io pg-main \
                -o jsonpath='{range .spec.managed.roles[*]}{.name}{" "}{.passwordSecret.name}{"\n"}{end}' \
              | while read -r role secret; do
                  [ -z "$role" ] && continue
                  if kubectl -n database get secret "$secret" >/dev/null 2>&1; then
                    echo "secret $secret présent, on ne touche pas"
                    continue
                  fi
                  pw="$(gen)"
                  kubectl -n database create secret generic "$secret" \
                    --type=kubernetes.io/basic-auth \
                    --from-literal=username="$role" \
                    --from-literal=password="$pw"
                  # cnpg.io/reload → CNPG applique le mot de passe au rôle managé
                  kubectl -n database label secret "$secret" cnpg.io/reload=true
                  # Réplication push vers le namespace homonyme du rôle
                  kubectl -n database annotate secret "$secret" \
                    replicator.v1.mittwald.de/replicate-to="$role"
                  echo "secret $secret créé (réplication -> ns $role)"
                done
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
