---
# Génère un mot de passe aléatoire par rôle applicatif et le stocke dans un
# Secret kubernetes.io/basic-auth consommé par les rôles « managed » du Cluster
# CNPG (passwordSecret). Les secrets sont aussi répliqués (kubernetes-replicator)
# vers le namespace de chaque application pour la migration (Phase 1) et la
# bascule (Phase 2). Idempotent : ne régénère pas un secret déjà présent.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: pg-secret-init
    namespace: database
roleRef:
  kind: Role
  name: pg-secret-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pg-secret-init
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: pg-secret-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: alpine/k8s:1.30.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              gen() { tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 32; }
              # $1 = nom du rôle/app, $2 = namespace cible de réplication
              create() {
                app="$1"; ns="$2"
                if kubectl -n database get secret "${app}-db" >/dev/null 2>&1; then
                  echo "secret ${app}-db déjà présent, on ne touche pas"
                  return 0
                fi
                pw="$(gen)"
                kubectl -n database create secret generic "${app}-db" \
                  --type=kubernetes.io/basic-auth \
                  --from-literal=username="${app}" \
                  --from-literal=password="${pw}"
                # cnpg.io/reload → CNPG applique le mot de passe au rôle managé
                kubectl -n database label secret "${app}-db" cnpg.io/reload=true
                # Réplication push vers le namespace de l'application
                kubectl -n database annotate secret "${app}-db" \
                  replicator.v1.mittwald.de/replicate-to="${ns}"
                echo "secret ${app}-db créé et répliqué vers ${ns}"
              }
              create zitadel zitadel
              create coder    coder
              create gitea    gitea
              create litellm  litellm
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
