apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-backup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ekozan/agrocd-home.git
    targetRevision: HEAD
    path: ./infra/longhorn-backup
  destination:
    server: https://kubernetes.default.svc
    # Longhorn est installe par Rancher ; on ne cree PAS le namespace, on y
    # depose seulement le BackupTarget et les RecurringJobs.
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
