apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"    
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitea
    # Sync policy
  syncPolicy:
    # Pod Security Admission — phase A : inventaire sans blocage (warn + audit)
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/audit: restricted
    syncOptions:
      - CreateNamespace=true
    automated: 
      prune: true
      selfHeal: true
  source:
    chart: gitea
    repoURL: https://dl.gitea.com/charts/
    targetRevision: 12.4.0
    helm:
      releaseName: gitea
      valuesObject:
        # Priorité « application » (cf. init/04-priorityclasses). Clé top-level
        # documentée du chart Gitea ; vérifier via `helm show values gitea`
        # si la valeur n'est pas prise en compte.
        priorityClassName: homelab-app
        image:
          tag: 1.25.3
        ingress:
          enabled: true
          # Protection CrowdSec (bouncer + AppSec) sur Gitea
          annotations:
            traefik.ingress.kubernetes.io/router.middlewares: traefik-crowdsec@kubernetescrd
          hosts:
            - host: git.ffd.link
              paths:
                - path: /
                  pathType: Prefix
        gitea:
          config:
            server: 
              ROOT_URL: https://git.ffd.link
        postgresql-ha:
          enabled: false
        postgresql:
          image:
            repository: bitnamilegacy/postgresql
            tag: 16
          enabled: true
          global:
            postgresql:
              service:
                ports:
                  postgresql: 5432
          primary:
            persistence:
              size: 10Gi
        valkey-cluster:
          enabled: false
        valkey:
          enabled: true
