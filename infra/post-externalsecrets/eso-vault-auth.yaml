# ServiceAccount dédié à l'authentification d'External-Secrets auprès d'OpenBao
# (auth Kubernetes du ClusterSecretStore openbao-backend).
#
# ESO forge un token éphémère pour ce SA (TokenRequest) et le présente à
# OpenBao. Le SA n'a AUCUN droit applicatif ; il lui faut seulement pouvoir
# être vérifié via TokenReview, d'où le bind sur system:auth-delegator.
#
# Côté OpenBao, le rôle kubernetes doit lier ce SA :
#   bound_service_account_names=eso-vault-auth
#   bound_service_account_namespaces=external-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-vault-auth
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-vault-auth-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: eso-vault-auth
    namespace: external-secrets
---
# Token long-lived pour le SA — sert de "token_reviewer_jwt" côté OpenBao
# EXTERNE (qui doit appeler l'API Kubernetes pour les TokenReview, sans pod
# local). Kubernetes peuple .data.token et .data["ca.crt"] au runtime ; rien
# de secret n'est stocké dans Git. Portée limitée : ce token ne permet QUE le
# TokenReview (system:auth-delegator), pas la lecture de secrets.
apiVersion: v1
kind: Secret
metadata:
  name: eso-vault-auth-token
  namespace: external-secrets
  annotations:
    kubernetes.io/service-account.name: eso-vault-auth
type: kubernetes.io/service-account-token

