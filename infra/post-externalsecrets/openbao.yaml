apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-backend
  namespace: external-secrets
spec:
  provider:
    vault:
      server: "https://openbao.ffd.link"
      path: "kv"
      # Version is the Vault KV secret engine version.
      # This can be either "v1" or "v2", defaults to "v2"
      version: "v2"
      auth:
        # Auth Kubernetes : ESO forge un token éphémère pour le SA dédié
        # eso-vault-auth (cf. eso-vault-auth.yaml) et le présente à OpenBao,
        # qui le valide via TokenReview puis émet un token court scopé par la
        # policy eso-readonly. Plus de token statique au repos.
        #
        # ⚠️ PRÉREQUIS (côté OpenBao, à faire AVANT de merger ce changement) :
        #   1. bao auth enable kubernetes
        #   2. bao write auth/kubernetes/config kubernetes_host=... kubernetes_ca_cert=@ca.crt
        #   3. policy eso-readonly en lecture sur kv/data/kubernetes/*
        #   4. bao write auth/kubernetes/role/external-secrets \
        #        bound_service_account_names=eso-vault-auth \
        #        bound_service_account_namespaces=external-secrets \
        #        policies=eso-readonly ttl=15m
        # Sinon ESO ne pourra plus s'authentifier → ExternalSecrets en échec.
        #
        # Une fois validé, supprimer le Secret openbao-token devenu inutile.
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: eso-vault-auth
            namespace: external-secrets

