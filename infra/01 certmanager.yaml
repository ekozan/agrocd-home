apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: 1.15.*
    helm:
      releaseName: cert-manager
      valuesObject:
        # Priorité « socle plateforme » appliquée à tous les pods cert-manager
        # (controller, webhook, cainjector) via la valeur globale du chart.
        global:
          priorityClassName: homelab-platform
        crds:
          enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: cert-manager
  # Sync policy
  syncPolicy:
    # Pod Security Admission — phase A : inventaire sans blocage (warn + audit)
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/audit: restricted
    syncOptions:
      - CreateNamespace=true
    automated: 
      prune: true
      selfHeal: true