apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oxicloud
  namespace: argocd
  annotations:
    # Après pg-main (wave 4) et les network-policies (wave 8) : OxiCloud a besoin
    # de la base `oxicloud` et de la CA `pg-main-ca`. Les ExternalSecrets
    # dépendent aussi d'external-secrets (wave 1) et du store OpenBao (wave 2).
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  source:
    repoURL: https://github.com/ekozan/agrocd-home.git
    targetRevision: HEAD
    path: ./infra/oxicloud

  destination:
    server: https://kubernetes.default.svc
    # Le namespace réel de chaque ressource est porté par le manifest
    # (metadata.namespace = oxicloud) ; cette valeur n'est qu'un défaut ArgoCD.
    namespace: oxicloud

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
