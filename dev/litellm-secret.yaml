apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secret
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: litellm-secret
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: kubernetes/litellm/anthropic
        property: api_key
