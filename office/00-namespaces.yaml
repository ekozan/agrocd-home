---
# Namespace Euro-Office — serveur de documents (fork OnlyOffice).
# L'image embarque plusieurs services (rabbitmq/redis/nginx) lancés par
# supervisord → PSA restricted non applicable : on reste en warn/audit
# baseline pour ne pas bloquer le pod.
# (OxiCloud est désormais géré par la couche infra : infra/10-oxicloud.yaml.)
apiVersion: v1
kind: Namespace
metadata:
  name: euro-office
  labels:
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "0"
